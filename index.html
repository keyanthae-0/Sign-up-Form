<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up Form</title>
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <div class="container-left"></div>
        <div class="container-right">
            <div class="top-container">
                <div class="inner-top-content">
                    <h1>This is not a real online service! You know you need something<br>
                        like this in your life to help you realize your <em>deepest</em> dreams.<br>
                        Sign up <i>now</i> to get started
                    </h1>
                <h2 id="title1">You know you want to.</h2>
                </div>
            </div>
            <div class="middle-container">

                <h2 id="title2">Let's Do This!</h2>

                <form>
                    <div class="input">
                        <label for="first_name"">First Name:</label>
                        <input type="text" id="first_name" required>
                    </div>

                    <div class="input">
                        <label for="last_name">Last Name:</label>
                        <input type="text" id="last_name" required>
                    </div>

                    <div class="input">
                        <label for="Email">Email:</label>
                        <input type="email" id="Email" required>
                    </div>

                    <div class="input">
                        <label for="phone_number">Phone Number:</label>
                        <input type="number" id="phone_number" required>
                    </div>

                    <div class="input">
                        <label for="password">Password:</label>
                        <input type="password" id="password" required>
                    </div>

                    <div class="input">
                        <label for="confirm_password">Confirm Password:</label>
                        <input type="password" id="confirm_password" required>
                    </div>
                </form>

            </div>
            <div class="bottom-container">
                    <div class="sign-upbox">
                        <div class="button">
                            <button class="signup">Sign Up</button>
                        </div>
                        <div class="login">
                            <h1 id="title1">Already have an account? <em>Login</em></h1>
                        </div>  
                    </div>
            </div>
        </div>
    </div>
</body>
</html>
